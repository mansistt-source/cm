<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONTENT/MACHINE — دخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0a0807; height: 100%; }
  * { box-sizing: border-box; }
  body { font-family: 'Inter', 'Noto Kufi Arabic', sans-serif; }
  ::selection { background: #ff4332; color: #0a0807; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0807; }
  ::-webkit-scrollbar-thumb { background: #2a1f1c; }
  ::-webkit-scrollbar-thumb:hover { background: #ff4332; }
  [dir="rtl"] { font-family: 'Noto Kufi Arabic', 'Inter', sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="palettes.jsx"></script>
<script type="text/babel" src="hud.jsx"></script>
<script type="text/babel" src="shaders.jsx"></script>
<script type="text/babel" src="lobby.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="pages-auth-misc.jsx"></script>
<script type="text/babel" src="pages-dashboard.jsx"></script>
<script type="text/babel" src="pages-create-market.jsx"></script>
<script type="text/babel" src="pages-projects.jsx"></script>

<script type="text/babel" data-presets="react">
const p = window.PALETTES.crimson;

// read project from query string if passed (?p=ID)
function getQueryProject() {
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("p");
    if (!id) return null;
    const store = window.loadProjects();
    return [...(store.film || []), ...(store.market || [])].find(x => x.id === id);
  } catch (e) { return null; }
}

function navigate(target, params = {}) {
  // store params for the destination if it's create/market via project
  if (params.project) {
    const url = target === "create" ? "create.html?p=" + params.project.id :
                target === "market" ? "market.html?p=" + params.project.id :
                null;
    if (url) { window.location.href = url; return; }
  }
  const map = {
    "landing":   "landing-page.html",
    "auth":      "auth.html",
    "dashboard": "dashboard.html",
    "film-hub":  "film-hub.html",
    "create":    "create.html",
    "market-hub":"market-hub.html",
    "market":    "market.html",
    "library":   "site.html",
    "settings":  "site.html",
    "project-detail": "site.html",
  };
  if (map[target]) window.location.href = map[target];
}

function App() {
  
  return <AuthPage p={p} navigate={navigate} />;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
