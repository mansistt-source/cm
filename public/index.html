<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONTENT/MACHINE — Crimson Ops</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #0a0807; min-height: 100%; }
  * { box-sizing: border-box; }
  body { font-family: 'Inter', 'Noto Kufi Arabic', sans-serif; }
  ::selection { background: #ff4332; color: #0a0807; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0807; }
  ::-webkit-scrollbar-thumb { background: #2a1f1c; }
  ::-webkit-scrollbar-thumb:hover { background: #ff4332; }
  [dir="rtl"] { font-family: 'Noto Kufi Arabic', 'Inter', sans-serif; }
  #root { min-height: 100vh; background: #0a0807; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="palettes.jsx"></script>
<script type="text/babel" src="hud.jsx"></script>
<script type="text/babel" src="shaders.jsx"></script>
<script type="text/babel" src="lobby.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="landing-page.jsx"></script>
<script type="text/babel" src="pages-auth-misc.jsx"></script>
<script type="text/babel" src="pages-dashboard.jsx"></script>
<script type="text/babel" src="pages-create-market.jsx"></script>
<script type="text/babel" src="pages-marketing-modes.jsx"></script>
<script type="text/babel" src="pages-marketing-studio.jsx"></script>
<script type="text/babel" src="pages-service-agent.jsx"></script>
<script type="text/babel" src="pages-projects.jsx"></script>
<script type="text/babel" src="pages-billing.jsx"></script>
<script type="text/babel" src="pages-hubs.jsx"></script>
<script type="text/babel" src="pages-ugc-avatar.jsx"></script>

<script type="text/babel" data-presets="react">
const p = window.PALETTES.crimson;

const ROUTES = {
  landing: "landing",
  auth: "auth",
  dashboard: "dashboard",
  "service-agent": "service-agent",
  "film-hub": "film-hub",
  create: "create",
  "market-hub": "market-hub",
  market: "market",
  "ugc-avatar": "ugc-avatar",
  library: "library",
  "project-detail": "project-detail",
  settings: "settings",
  billing: "billing",
  "security-2fa": "security-2fa",
};

const PRIVATE_ROUTES = new Set([
  "dashboard", "service-agent", "film-hub", "create", "market-hub", "market", "ugc-avatar", "library", "project-detail", "settings", "security-2fa"
]);

function cmBrowserAuthed() {
  return Boolean(window.CM_AUTH?.isAuthed?.() || localStorage.getItem("cm_token"));
}

const PATH_ALIASES = {
  "": "landing",
  "index": "landing",
  "index.html": "landing",
  "site": "landing",
  "site.html": "landing",
  "landing-page": "landing",
  "landing-page.html": "landing",
  "auth": "auth",
  "auth.html": "auth",
  "dashboard": "dashboard",
  "dashboard.html": "dashboard",
  "service-agent": "service-agent",
  "service-agent.html": "service-agent",
  "film-hub": "film-hub",
  "film-hub.html": "film-hub",
  "create": "create",
  "create.html": "create",
  "market-hub": "market-hub",
  "market-hub.html": "market-hub",
  "market": "market",
  "market.html": "market",
  "ugc-avatar": "ugc-avatar",
  "ugc-avatar.html": "ugc-avatar",
  "library": "library",
  "projects": "library",
  "project-detail": "project-detail",
  "settings": "settings",
  "billing": "billing",
  "billing.html": "billing",
  "credits": "billing",
  "security-2fa": "security-2fa",
};

function cleanRoute(raw) {
  const value = String(raw || "").replace(/^#\/?/, "").replace(/^\/?/, "").replace(/\?.*$/, "").replace(/\/$/, "");
  return PATH_ALIASES[value] || ROUTES[value] || "404";
}

function readRoute() {
  if (window.location.hash && window.location.hash !== "#") return cleanRoute(window.location.hash);
  return cleanRoute(window.location.pathname.split("/").filter(Boolean).pop() || "");
}

function RouteLoader({ p, show }) {
  if (!show) return null;
  return <div style={{ position:"fixed", inset:0, zIndex:9999, background:"rgba(10,8,7,.86)", backdropFilter:"blur(10px)", display:"flex", alignItems:"center", justifyContent:"center" }}>
    <div style={{ width:360, maxWidth:"86vw", textAlign:"center" }}>
      <AuroraLoader p={p} size={110} />
      <div style={{ marginTop:18, fontFamily:"'Space Mono', monospace", fontSize:10, color:p.accent, letterSpacing:".28em" }}>LOADING_ROUTE</div>
    </div>
  </div>;
}

class AppErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    console.error("CM_ROUTE_ERROR", error, info);
  }
  render() {
    if (!this.state.error) return this.props.children;
    return <PageFrame p={p} density={0.25}>
      <div style={{ padding:"32px", maxWidth:760, margin:"0 auto" }}>
        <Panel p={p} padding={28}>
          <Tag p={p} color={p.warn}>ROUTE_ERROR</Tag>
          <div style={{ fontFamily:"'Bebas Neue', sans-serif", fontSize:34, color:p.fg, letterSpacing:".05em", marginTop:14 }}>حدث خطأ في الصفحة</div>
          <div style={{ fontFamily:"'Inter', sans-serif", fontSize:13, color:p.dim, lineHeight:1.8, marginTop:8 }}>تم منع الشاشة السوداء. افتح Console لو محتاج تفاصيل الخطأ، أو ارجع للرئيسية.</div>
          <pre style={{ whiteSpace:"pre-wrap", direction:"ltr", textAlign:"left", background:p.bg0, color:p.warn, border:`1px solid ${p.border}`, padding:12, marginTop:16, maxHeight:180, overflow:"auto" }}>{String(this.state.error?.message || this.state.error)}</pre>
          <div style={{ display:"flex", gap:10, marginTop:18 }}>
            <CrunchBtn p={p} label="الرئيسية" solid onClick={() => { this.setState({ error:null }); window.location.hash = "#/dashboard"; }} />
            <CrunchBtn p={p} label="تحديث" onClick={() => window.location.reload()} />
          </div>
        </Panel>
      </div>
    </PageFrame>;
  }
}

function App() {
  const [route, setRoute] = React.useState(readRoute);
  const [params, setParams] = React.useState({});
  React.useEffect(() => {
    const onHash = () => { setRoute(readRoute()); };
    const onAuth = () => {
      const nextRoute = readRoute();
      if (PRIVATE_ROUTES.has(nextRoute) && !cmBrowserAuthed()) {
        navigate("auth");
      } else {
        setRoute(nextRoute);
      }
    };
    window.addEventListener("hashchange", onHash);
    window.addEventListener("cm-auth-changed", onAuth);
    window.addEventListener("pageshow", onAuth);
    window.__cmNav = navigate;
    onAuth();
    return () => {
      window.removeEventListener("hashchange", onHash);
      window.removeEventListener("cm-auth-changed", onAuth);
      window.removeEventListener("pageshow", onAuth);
      delete window.__cmNav;
    };
  }, []);

  React.useEffect(() => {
    if (PRIVATE_ROUTES.has(route) && !cmBrowserAuthed()) {
      navigate("auth");
    }
  }, [route]);

  function navigate(target, nextParams = {}) {
    const next = cleanRoute(target);
    setParams(nextParams || {});
    if (next === "404") {
      window.location.hash = "#/404";
      setRoute("404");
      return;
    }
    if (window.location.hash !== `#/${next}`) window.location.hash = `#/${next}`;
    setRoute(next);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  const common = { p, navigate, user: window.CM_AUTH?.getUser?.() };

  if (PRIVATE_ROUTES.has(route) && !cmBrowserAuthed()) {
    return <AuthPage {...common} />;
  }

  let view;

  switch (route) {
    case "landing":
      view = <LandingPage />;
      break;
    case "auth":
      view = <AuthPage {...common} />;
      break;
    case "dashboard":
      view = <DashboardPage {...common} />;
      break;
    case "service-agent":
      view = <ServiceAgentPage {...common} />;
      break;
    case "film-hub":
      view = <FilmHubPage {...common} />;
      break;
    case "create":
      view = <CreatePage {...common} project={params.project} />;
      break;
    case "market-hub":
      view = <MarketHubPage {...common} />;
      break;
    case "market":
      view = <MarketStudioPage {...common} project={params.project} />;
      break;
    case "ugc-avatar":
      view = <UgcAvatarPage {...common} />;
      break;
    case "library":
      view = <LibraryPage {...common} />;
      break;
    case "project-detail":
      view = <ProjectDetailPage {...common} projectId={params.id || localStorage.getItem("cm_last_project_id") || 1} />;
      break;
    case "billing":
      view = <BillingPage {...common} />;
      break;
    case "settings":
      view = <SettingsPage {...common} />;
      break;
    case "security-2fa":
      view = <TwoFactorActivationPage {...common} />;
      break;
    default:
      view = <NotFoundPage {...common} />;
  }

  return <AppErrorBoundary key={route}>{view}</AppErrorBoundary>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
(function () {
  function cmRouteToBilling() {
    try {
      if (window.location.hash !== '#/billing') window.location.hash = '#/billing';
      window.scrollTo({ top: 0, behavior: 'auto' });
    } catch (_) { window.location.href = '/#/billing'; }
  }
  window.cmGoBilling = window.cmGoBilling || cmRouteToBilling;
  document.addEventListener('click', function (event) {
    var node = event.target && event.target.closest && event.target.closest('button,a,[role="button"]');
    if (!node) return;
    if ((window.location.hash || '').includes('/billing')) return;
    var text = (node.innerText || node.textContent || '').trim().toLowerCase();
    var isFinancialText = /(paypal|pay|billing|top\s*up|upgrade|subscribe|اشتراك|ترقية|تجديد|جدد|دفع|ادفع|شراء|رصيد|كريدت|كريديت|خطة)/i.test(text);
    var inPricingArea = !!(node.closest('#plans,#payg,[data-billing-area],[data-pricing-area]'));
    if (isFinancialText && (inPricingArea || /(paypal|اشتراك|ترقية|تجديد|جدد|دفع|ادفع|شراء|رصيد|كريدت|كريديت)/i.test(text))) {
      event.preventDefault();
      event.stopPropagation();
      cmRouteToBilling();
    }
  }, true);
})();
</script>

</body>
</html>
